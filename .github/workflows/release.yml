name: Release

on:
  push:
    tags:
      - '*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    name: Build macos-${{ matrix.arch }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            swift-args: ''
          - arch: x86_64
            swift-args: '--arch x86_64'

    steps:
      - uses: actions/checkout@v4

      - name: Stamp version from tag
        run: |
          sed -i.bak "s/version: \"[^\"]*\"/version: \"${{ github.ref_name }}\"/" Sources/CLIManager/App.swift
          rm -f Sources/CLIManager/App.swift.bak

      - name: Build
        run: swift build -c release --product cli-manager ${{ matrix.swift-args }}

      - name: Stage binary
        run: cp .build/release/cli-manager cli-manager-macos-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-manager-macos-${{ matrix.arch }}
          path: cli-manager-macos-${{ matrix.arch }}

  build-linux:
    name: Build linux-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    container: swift:6.2
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Stamp version from tag
        run: |
          sed -i.bak "s/version: \"[^\"]*\"/version: \"${{ github.ref_name }}\"/" Sources/CLIManager/App.swift
          rm -f Sources/CLIManager/App.swift.bak

      - name: Build
        run: swift build -c release --product cli-manager

      - name: Stage binary
        run: cp .build/release/cli-manager cli-manager-linux-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-manager-linux-${{ matrix.arch }}
          path: cli-manager-linux-${{ matrix.arch }}

  release:
    name: Publish GitHub Release
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: cli-manager-*
          generate_release_notes: true
