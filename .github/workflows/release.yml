name: Release

on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: Build ${{ matrix.os-name }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            os-name: macos
            arch: arm64
          - runner: macos-13
            os-name: macos
            arch: x86_64
          - runner: ubuntu-latest
            os-name: linux
            arch: x86_64
          - runner: ubuntu-24.04-arm
            os-name: linux
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Swift
        if: runner.os == 'Linux'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'

      - name: Build
        run: swift build -c release --product agent-manager

      - name: Stage binary
        run: cp .build/release/agent-manager agent-manager-${{ matrix.os-name }}-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-manager-${{ matrix.os-name }}-${{ matrix.arch }}
          path: agent-manager-${{ matrix.os-name }}-${{ matrix.arch }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: agent-manager-*
          generate_release_notes: true
